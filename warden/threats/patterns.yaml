# ─── Action-Specific Patterns ────────────────────────────────────────────────
action_patterns:

  # Excessive slippage — common in MEV/sandwich attack setups
  high_slippage_swap:
    actions: [swap, trade]
    conditions:
      slippage_bps: [5000, 10000]  # 50%+ slippage is almost always malicious

  # Infinite approval pattern — common in wallet drainers
  infinite_approval:
    actions: [approve, set_allowance]
    conditions:
      amount:
        - 115792089237316195423570985008687907853269984665640564039457584007913129639935  # uint256 max

  # Transfer to zero address (burns / often mistakes or attacks)
  zero_address_transfer:
    actions: [transfer, token_transfer, send]
    conditions:
      recipient:
        - "0x0000000000000000000000000000000000000000"
        - "0x000000000000000000000000000000000000dead"
